<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Noms Pokémon</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
    }

    .lang-time-bar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 1001;
    }

    .lang-container {
      display: flex;
      align-items: center;
      background: #1f2937;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    #currentFlag {
      width: 28px;
      height: 20px;
      margin-right: 8px;
      border-radius: 3px;
      object-fit: cover;
      vertical-align: middle;
      border: 1px solid #374151;
    }

    .lang-time-bar select {
      padding: 4px 0;
      background: transparent;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      outline: none;
    }

    .lang-time-bar select option {
      background: #1f2937;
    }

    .lang-time-bar button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #f59e0b;
      color: #111827;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .lang-time-bar button:hover {
      transform: scale(1.05);
    }

    .lang-time-bar button.active {
      background: #10b981;
      color: white;
    }

    #timerDisplay {
      display: none;
      font-size: 1.2em;
      font-weight: bold;
      color: #facc15;
      background: #1f2937;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #374151;
    }

    @media (max-width: 800px) {
      .lang-time-bar {
        position: relative;
        top: 0;
        right: 0;
        justify-content: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    h4 {
      text-align: center;
      margin-bottom: 10px;
      color: #9ca3af;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(8px);
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 20px;
      border: 1px solid #374151;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    .actions {
      flex-basis: 100%;
      display: flex;
      gap: 10px;
      margin-top: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .actions2 {
      flex-basis: 100%;
      display: flex;
      gap: 10px;
      margin-top: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .input-container {
      position: relative;
      width: 320px;
      max-width: 90%;
    }

    #guessInput {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    #revealAllButton {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #3a5bed;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #revealAllButton:hover {
      transform: scale(1.05);
    }

    #resetButton {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #dc2626;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    #resetButton:hover {
      transform: scale(1.05);
    }

    .autocomplete-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      background: #1f2937;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #374151;
      cursor: pointer;
    }

    #suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 4px;
      z-index: 2000;
      display: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .suggestion-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #374151;
    }

    .suggestion-item:hover {
      background: #374151;
    }

    .stats {
      font-size: 18px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
    }

    .pokemon-card {
      background: #1f2937;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      transition: 0.2s;
      border: 2px solid transparent;
      min-height: 170px;
      cursor: pointer;
    }

    .pokemon-card.found {
      background: #065f46;
      border-color: #10b981;
    }

    .pokemon-card.found-help {
      background: #f59e0b;
      border-color: #fb9e24;
    }

    .pokemon-card.revealed {
      background: #7f1d1d;
      border-color: #ef4444;
    }

    .pokemon-card.partial {
      background: #facc15;
      border-color: #eab308;
      color: #111827;
    }

    .pokemon-number {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 5px;
    }

    .pokemon-image {
      width: 96px;
      height: 96px;
      image-rendering: pixelated;
      cursor: pointer;
    }

	body.no-image-mode .pokemon-image {
		visibility: hidden;
	}

	body.no-image-mode .pokemon-card.show-image .pokemon-image {
		visibility: visible;
	}

    .pokemon-name {
      margin-top: 8px;
      font-weight: bold;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .hidden-name {
      color: #6b7280;
      letter-spacing: 2px;
    }

    @keyframes blink-success {
      0% { background-color: #DD00FF; box-shadow: 0 0 15px #FF006A; }
      50% { background-color: #FF006A; box-shadow: 0 0 30px #DD00FF; transform: scale(1.15); }
      100% { background-color: #DD00FF; box-shadow: 0 0 15px #FF006A; }
    }

    .blink-active {
      animation: blink-success 0.5s ease-in-out 5;
      z-index: 10;
      position: relative;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
      .pokemon-image {
        width: 72px;
        height: 72px;
      }
    }
  </style>
</head>
<body>



  <h1 id="mainTitle">Trouve le nom des <span id="titleCount">...</span> Pokémon</h1>
  <h4 id="mainSubtitle">Un clic sur un Pokémon révèle les 3 premières lettres de son nom, deux clics donne le nom complet !</h4>

  <div class="top-bar">
    <div class="lang-time-bar">
    <div class="lang-container">
      <img id="currentFlag" src="https://flagcdn.com/w40/fr.png" alt="Français">

        <option value="fr">Français</option>

  </div>
    <div class="input-container">
      <input
        type="text"

    </div>

    <div class="actions">
      <div class="stats"><span id="lblPartial">🟡 Aide 3 premières lettres : </span><span id="countPartial">0</span></div>
      <div class="stats"><span id="lblWriteHelp">🟠 Aide à l'écriture du nom : </span><span id="countHelp">0</span></div>
      <div class="stats" style="display:none;"><span id="lblClick2">🔴 2 clics : </span><span id="countRevealed">0</span></div>
      <div class="stats"><span id="lblNotFound">🔴 Non trouvés : </span><span id="countRevealAll">0</span></div>
      <div class="stats"><span id="lblNoHelp">🟢 Trouvés sans aide : </span><span id="countFound">0</span></div>
    </div>

    <div class="actions2">
      <label class="autocomplete-toggle">
        <input type="checkbox" id="autocompleteToggle">
        <span id="lblToggleAide">Aide noms Pokémon</span>
      </label>

      <button id="revealAllButton">Tout Révéler</button>
      <button id="resetButton">Reset</button>

  </div>

  <div class="grid" id="pokemonGrid"></div>

  <script>
    const i18n = {

        noImageModeOn: "🖼️ Mostrar imágenes", 
        confirmTime: "¿Iniciar contrarreloj de 1h? Tu progreso actual se reiniciará.",

      de: {

        subtitle: "Ein Klick verrät die ersten 3 Buchstaben, zwei Klicks den ganzen Namen!", 
        placeholder: "Pokémon-Name eingeben...", 
        found: "Gefunden:", partial: "🟡 3 Buchstaben Hilfe: ",

        notFound: "🔴 Nicht gefunden: ", 
        noHelp: "🟢 Ohne Hilfe gefunden: ",

        timeUp: "Zeit abgelaufen! Punktzahl: " 
      },
      it: { 
        title: "Trova i nomi di tutti i {count} Pokémon", 
        subtitle: "Un clic rivela le prime 3 lettere, due clic rivelano il nome completo!", 
        placeholder: "Scrivi il nome di un Pokémon...", 
        found: "Trovati:", partial: "🟡 Aiuto 3 lettere: ", 
        writeHelp: "🟠 Aiuto digitazione: ", 
        click2: "🔴 2 clic: ", 
        notFound: "🔴 Non trovati: ", 
        noHelp: "🟢 Trovati senza aiuto: ", 
        toggleAide: "Aiuto nomi", 
        revealAll: "Rivela tutti", 
        reset: "Ripristina", 
        loading: "Caricamento di {count} Pokémon...", 
        timeAttack: "⏱️ Sfida a tempo (1h)", 
        noImageMode: "🖼️ Modalità senza immagini", 
        noImageModeOn: "🖼️ Mostra immagini", 
        confirmTime: "Iniziare la Sfida a tempo (1h)? Il tuo progresso attuale verrà cancellato.", 
        timeUp: "Tempo scaduto! Punteggio: " 
      },
      ja: { 
        title: "全{count}匹のポケモンの名前を当てよう", 
        subtitle: "1回クリックで最初の3文字のヒント、2回クリックで名前が表示されます！", 
        placeholder: "ポケモンの名前を入力...", 
        found: "見つけた数:", partial: "🟡 3文字のヒント: ", 
        writeHelp: "🟠 入力サポート: ", 
        click2: "🔴 2回クリック: ", 
        notFound: "🔴 未発見: ", 
        noHelp: "🟢 ヒントなしで発見: ", 
        toggleAide: "名前サポート", 
        revealAll: "すべて表示", 
        reset: "リセット", 
        loading: "{count}匹のポケモンを読み込み中...", 
        timeAttack: "⏱️ タイムアタック (1時間)", 
        noImageMode: "🖼️ 画像なしモード", 
        noImageModeOn: "🖼️ 画像を表示", 
        confirmTime: "1時間のタイムアタックを開始しますか？現在の進行状況はリセットされます。", 
        timeUp: "時間切れ！ スコア: " 
      }
    };

    const flags = {
      fr: 'https://flagcdn.com/w40/fr.png',
      en: 'https://flagcdn.com/w40/gb.png',
      es: 'https://flagcdn.com/w40/es.png',
      de: 'https://flagcdn.com/w40/de.png',
      it: 'https://flagcdn.com/w40/it.png',
      ja: 'https://flagcdn.com/w40/jp.png'
    };

    let currentLang = 'fr';
    let pokemonList = [];
    let MAX_POKEMON = 1025;
    let noImageMode = false;
    
    let timeAttackTimer = null;
    let timeRemaining = 3600;
    let scrollTimeout = null;

    const grid = document.getElementById("pokemonGrid");
    const input = document.getElementById("guessInput");
    const scoreElement = document.getElementById("score");
    const totalElement = document.getElementById("total");
    const suggestions = document.getElementById("suggestions");
    const autocompleteToggle = document.getElementById("autocompleteToggle");

    const foundPokemon = new Set();
    const pokemonStates = {};

    function updateLanguageUI() {
      const texts = i18n[currentLang];
      document.getElementById('mainTitle').innerHTML = texts.title.replace('{count}', MAX_POKEMON);
      document.getElementById('mainSubtitle').textContent = texts.subtitle;
      document.getElementById('guessInput').placeholder = texts.placeholder;
      document.getElementById('lblFound').textContent = texts.found;
      document.getElementById('lblPartial').textContent = texts.partial;
      document.getElementById('lblWriteHelp').textContent = texts.writeHelp;
      document.getElementById('lblClick2').textContent = texts.click2;
      document.getElementById('lblNotFound').textContent = texts.notFound;
      document.getElementById('lblNoHelp').textContent = texts.noHelp;
      document.getElementById('lblToggleAide').textContent = texts.toggleAide;
      document.getElementById('revealAllButton').textContent = texts.revealAll;
      document.getElementById('resetButton').textContent = texts.reset;
      document.getElementById('timeAttackBtn').textContent = texts.timeAttack;
      document.getElementById('noImageBtn').textContent = noImageMode ? texts.noImageModeOn : texts.noImageMode;
    }

    document.getElementById('langSelect').addEventListener('change',(e)=>{
currentLang=e.target.value;
document.getElementById('currentFlag').src=flags[currentLang];
localStorage.removeItem("pokemonQuizFound");
localStorage.removeItem("pokemonQuizStates");
foundPokemon.clear();for(let k in pokemonStates) delete pokemonStates[k];
if(timeAttackTimer){clearInterval(timeAttackTimer);document.getElementById('timeAttackBtn').style.display='inline-block';document.getElementById('timerDisplay').style.display='none';input.disabled=false;}
updateLanguageUI();createCards();updateScore();updateCounters();restoreFoundPokemon();
});

    function getPokemonName(pokemon, lang) {
      if (!pokemon.names) return pokemon.defaultName;
      let targetLang = lang;
      if (lang === 'ja') targetLang = 'ja-Hrkt'; // Use Kana for Japanese
      const nameObj = pokemon.names.find(n => n.language.name === targetLang || n.language.name === lang);
      return nameObj ? nameObj.name : pokemon.defaultName;
    }

    async function loadPokemonList() {
      try {
        const countRes = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=1');
        const countData = await countRes.json();
        MAX_POKEMON = countData.count || 1025; 
      } catch (e) {
        console.warn("Impossible de récupérer le count dynamique, utilisation de 1025.");
      }

      updateLanguageUI();
      grid.innerHTML = `<p style='grid-column:1/-1;text-align:center;'>${i18n[currentLang].loading.replace('{count}', MAX_POKEMON)}</p>`;
      pokemonList = [];

      try {
        const BATCH_SIZE = 100;
        for (let i = 1; i <= MAX_POKEMON; i += BATCH_SIZE) {
          const requests = [];
          for (let j = i; j < i + BATCH_SIZE && j <= MAX_POKEMON; j++) {
            requests.push(
              fetch(`https://pokeapi.co/api/v2/pokemon-species/${j}`)
                .then(r => r.ok ? r.json() : null)
                .then(data => {
                  if (!data) return;
                  pokemonList.push({
                    id: j,
                    names: data.names,
                    defaultName: data.name
                  });
                })
                .catch(() => null)
            );
          }
          await Promise.all(requests);
        }

        pokemonList.sort((a, b) => a.id - b.id);
        totalElement.textContent = pokemonList.length;

        createCards();
        loadProgress();
        restoreFoundPokemon();

      } catch (error) {
        console.error(error);
        grid.innerHTML = "<p>Erreur de réseau lors du chargement des Pokémon.</p>";
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadPokemonList();
    });

    function normalize(str) {
      if (!str) return "";
      str = str.normalize("NFD").replace(/[̀-ͯ]/g, "").toLowerCase().trim();
      str = str.replace(/^nidoran\s*(femelle|female|♀)$/i, "nidoran♀")
               .replace(/^nidoran\s*(male|mâle|♂)$/i, "nidoran♂");
      return str;
    }

    function createCards() {
      grid.innerHTML = "";
      pokemonList.forEach(pokemon => {
        const card = document.createElement("div");
        card.className = "pokemon-card";
        card.id = `pokemon-${pokemon.id}`;

        const paddedId = pokemon.id.toString().padStart(4, "0");

        card.innerHTML = `
          <div class="pokemon-number">#${paddedId}</div>
          <img
            class="pokemon-image"
            src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png"
            alt="Pokemon ${pokemon.id}"
            loading="lazy"
          >
          <div class="pokemon-name hidden-name">????????</div>
        `;

        const nameElement = card.querySelector(".pokemon-name");

        card.addEventListener("click", () => {
          if (foundPokemon.has(pokemon.id)) return;
          if (card.classList.contains("revealed")) return;

          const localizedName = getPokemonName(pokemon, currentLang);
          const firstThree = localizedName.slice(0, 3);
          nameElement.textContent = firstThree + "...";
          nameElement.classList.remove("hidden-name");

          card.classList.remove("found", "found-help", "revealed");
          card.classList.add("partial");

          pokemonStates[pokemon.id] = "partial";
          saveProgress();
          updateCounters();
        });

        card.addEventListener("dblclick", () => {
          if (foundPokemon.has(pokemon.id)) return;
          revealPokemon(pokemon, true);
        });

        grid.appendChild(card);
      });
    }

    function saveProgress() {
      localStorage.setItem("pokemonQuizFound", JSON.stringify([...foundPokemon]));
      localStorage.setItem("pokemonQuizStates", JSON.stringify(pokemonStates));
    }

    function loadProgress() {
      const saved = localStorage.getItem("pokemonQuizFound");
      if (saved) {
        JSON.parse(saved).forEach(id => foundPokemon.add(id));
      }
      const savedStates = localStorage.getItem("pokemonQuizStates");
      if (savedStates) {
        Object.assign(pokemonStates, JSON.parse(savedStates));
      }
    }

    function revealPokemon(pokemon, manualReveal = false, restoredState = null) {
      const card = document.getElementById(`pokemon-${pokemon.id}`);
      if (!card) return;

      const nameElement = card.querySelector(".pokemon-name");
      card.classList.remove("found", "found-help", "revealed", "partial");

      let state = restoredState;
      if (!state) {
        const wasPartial = pokemonStates[pokemon.id] === "partial";
        if (manualReveal) state = "revealed";
        else if (autocompleteToggle.checked) state = "found-help";
        else if (wasPartial) state = "partial";
        else state = "found";
      }

      card.classList.add(state);
if (noImageMode && (state !== "partial" || foundPokemon.has(pokemon.id))) {
          card.classList.add("show-image");
      } else {
          card.classList.remove("show-image");
      }
      pokemonStates[pokemon.id] = state;
      nameElement.textContent = getPokemonName(pokemon, currentLang);
      nameElement.classList.remove("hidden-name");

      saveProgress();
      updateCounters();
    }

    function updateScore() {
      scoreElement.textContent = foundPokemon.size;
    }

    function updateCounters() {
      let partial = 0, revealed = 0, found = 0, help = 0, revealAll = 0;
      Object.values(pokemonStates).forEach(state => {
        if (state === "partial") partial++;
        if (state === "revealed") { revealed++; revealAll++; }
        if (state === "found") found++;
        if (state === "found-help") help++;
      });

      document.getElementById("countPartial").textContent = partial;
      document.getElementById("countRevealed").textContent = revealed;
      document.getElementById("countFound").textContent = found;
      document.getElementById("countHelp").textContent = help;
      document.getElementById("countRevealAll").textContent = revealAll;
    }

    function restoreFoundPokemon() {
      pokemonList.forEach(pokemon => {
        const state = pokemonStates[pokemon.id];
        const card = document.getElementById(`pokemon-${pokemon.id}`);
        if (!card) return;

        const nameElement = card.querySelector(".pokemon-name");
        card.classList.remove("found", "found-help", "revealed", "partial");

        if (state) {
          card.classList.add(state);
		  if (noImageMode && (state !== "partial" || foundPokemon.has(pokemon.id))) {
              card.classList.add("show-image");
          } else {
              card.classList.remove("show-image");
          }
          const localizedName = getPokemonName(pokemon, currentLang);
          nameElement.textContent = state === "partial" && !foundPokemon.has(pokemon.id)
              ? localizedName.slice(0, 3) + "..."
              : localizedName;
          nameElement.classList.remove("hidden-name");
        }
      });
      updateScore();
      updateCounters();
    }

    function triggerFoundEffect(cardId) {
      const card = document.getElementById(cardId);
      if (!card) return;

      const prevScrollY = window.scrollY;
      const prevScrollX = window.scrollX;

      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.add('blink-active');

      if (scrollTimeout) clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        card.classList.remove('blink-active');
        window.scrollTo({ top: prevScrollY, left: prevScrollX, behavior: 'smooth' });
      }, 2500);
    }

    document.getElementById("revealAllButton").addEventListener("click", () => {
      if (!confirm(currentLang === 'fr' ? "Révéler tous les Pokémon non trouvés ?" : "Reveal all missing Pokémon?")) return;
      pokemonList.forEach(pokemon => {
        if (!foundPokemon.has(pokemon.id)) revealPokemon(pokemon, true);
      });
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      if (!confirm(currentLang === 'fr' ? "Réinitialiser toute la progression ?" : "Reset all progress?")) return;
      localStorage.removeItem("pokemonQuizFound");
      localStorage.removeItem("pokemonQuizStates");
      location.reload();
    });

document.getElementById("noImageBtn").addEventListener("click", () => {

    noImageMode = !noImageMode;

    document.body.classList.toggle("no-image-mode", noImageMode);
    document.getElementById("noImageBtn").classList.toggle("active", noImageMode);

    document.querySelectorAll(".pokemon-card").forEach(card => {

        const id = Number(card.id.replace("pokemon-", ""));
        const state = pokemonStates[id];

       if (noImageMode && state && (state !== "partial" || foundPokemon.has(id))) {
            card.classList.add("show-image");
        } else {
            card.classList.remove("show-image");
        }

    });

    updateLanguageUI();
});

    function showSuggestions(value) {
      if (!autocompleteToggle.checked || value.length < 3) {
        suggestions.style.display = "none";
        return;
      }

      const normalized = normalize(value);
      const matches = pokemonList.filter(pokemon => {
        const localizedName = getPokemonName(pokemon, currentLang);
        return normalize(localizedName).includes(normalized) && !foundPokemon.has(pokemon.id);
      }).slice(0, 8);

      if (matches.length === 0) {
        suggestions.style.display = "none";
        return;
      }

      suggestions.innerHTML = "";
      matches.forEach(pokemon => {
        const item = document.createElement("div");
        item.className = "suggestion-item";
        item.textContent = getPokemonName(pokemon, currentLang);
        item.addEventListener("click", () => {
          input.value = item.textContent;
          suggestions.style.display = "none";
          input.dispatchEvent(new Event("input"));
        });
        suggestions.appendChild(item);
      });
      suggestions.style.display = "block";
    }

    document.addEventListener("click", (event) => {
      if (!suggestions.contains(event.target) && event.target !== input) {
        suggestions.style.display = "none";
      }
    });

    input.addEventListener("input", () => {
      showSuggestions(input.value);
      const guess = normalize(input.value);
      if (!guess) return;

      for (const pokemon of pokemonList) {
        const normalizedName = normalize(getPokemonName(pokemon, currentLang));
        if (guess === normalizedName && !foundPokemon.has(pokemon.id)) {
          foundPokemon.add(pokemon.id);
          revealPokemon(pokemon);
          updateScore();
          saveProgress();

          input.value = "";
          suggestions.style.display = "none";
          
          triggerFoundEffect(`pokemon-${pokemon.id}`);
          break;
        }
      }
    });

    function updateTimerDisplay() {
      const h = Math.floor(timeRemaining / 3600).toString().padStart(2, '0');
      const m = Math.floor((timeRemaining % 3600) / 60).toString().padStart(2, '0');
      const s = (timeRemaining % 60).toString().padStart(2, '0');
      document.getElementById('timerDisplay').textContent = `${h}:${m}:${s}`;
    }

    document.getElementById("timeAttackBtn").addEventListener("click", () => {
      if (!confirm(i18n[currentLang].confirmTime)) return;
      
      localStorage.removeItem("pokemonQuizFound");
      localStorage.removeItem("pokemonQuizStates");
      foundPokemon.clear();
      for (let k in pokemonStates) delete pokemonStates[k];
      
      updateScore();
      updateCounters();
      restoreFoundPokemon();
      createCards();

      document.getElementById('timeAttackBtn').style.display = 'none';
      document.getElementById('timerDisplay').style.display = 'block';

      timeRemaining = 3600;
      updateTimerDisplay();

      if (timeAttackTimer) clearInterval(timeAttackTimer);
      timeAttackTimer = setInterval(() => {
        timeRemaining--;
        updateTimerDisplay();
        if (timeRemaining <= 0) {
          clearInterval(timeAttackTimer);
          input.disabled = true;
          alert(i18n[currentLang].timeUp + foundPokemon.size);
        }
      }, 1000);
    });

  </script>
</body>
</html>
