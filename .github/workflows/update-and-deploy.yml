name: Mettre à jour PokeAPI et déployer le quiz

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pokemon-quiz-pages
  # Un nouveau push rend obsolète un workflow encore basé sur l'ancien commit.
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Se synchroniser avec la dernière version de la branche
        run: |
          git fetch --prune origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"

      - name: Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstruire la base locale intégrée
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/update-offline-data.mjs index.html

      - name: Valider le quiz autonome
        run: node tools/validate-quiz.mjs index.html

      - name: Enregistrer la nouvelle copie autonome
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- index.html; then
            echo "La copie autonome est déjà à jour."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: actualiser les données PokeAPI hors ligne"

          for tentative in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi

            echo "::warning::La branche a évolué pendant le workflow (tentative ${tentative}/3). Nouvelle synchronisation."
            git fetch --prune origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"

            # Reconstruire depuis le dernier index.html évite d'écraser une
            # modification arrivée pendant l'exécution du workflow.
            node tools/update-offline-data.mjs index.html
            node tools/validate-quiz.mjs index.html
            if git diff --quiet -- index.html; then
              echo "La mise à jour a déjà été intégrée par un autre commit."
              exit 0
            fi
            git add index.html
            git commit -m "chore: actualiser les données PokeAPI hors ligne"
          done

          echo "::error::Impossible de publier après trois tentatives."
          exit 1

      - name: Préparer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer le site à publier
        run: |
          mkdir _site
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Envoyer le site à GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
