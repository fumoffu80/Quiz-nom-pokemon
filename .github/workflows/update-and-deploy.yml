name: Mettre à jour PokeAPI et déployer le quiz

on:
  push:
    branches: [main, master]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pokemon-quiz-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstruire la base locale intégrée
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/update-offline-data.mjs index.html

      - name: Enregistrer la nouvelle copie autonome
        run: |
          if ! git diff --quiet -- index.html; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "chore: actualiser les données PokeAPI hors ligne"
            git push
          fi

      - name: Préparer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer le site à publier
        run: |
          mkdir _site
          cp index.html _site/index.html
          touch _site/.nojekyll

      - name: Envoyer le site à GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

